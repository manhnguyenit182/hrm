name: Deploy to AWS ECS & S3

on:
  push:
    branches:
      - main

# Required for AWS OIDC authentication
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1                   # TODO: Change to your region
  ECR_REPOSITORY: hrm-app                      # Name of ECR Repo
  ECS_CLUSTER: hrm-cluster                     # Name of ECS Cluster
  ECS_SERVICE: hrm-service                     # Name of ECS Service
  ECS_TASK_DEFINITION: .aws/task-def.json      # Path to task definition
  S3_BUCKET: hrm-static-assets-ndinmah         # Name of S3 Bucket
  CLOUDFRONT_DIST_ID: E1XXXXXXXXXX             # TODO: Change to your CloudFront ID
  NEXT_PUBLIC_CDN_URL: https://cdn.ndinmah.xyz # Your custom CDN Domain

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/GitHubActionsRole # TODO: Update Account ID
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies & Build
        run: |
          npm ci
          npx prisma generate
          npm run build
        env:
          NEXT_PUBLIC_CDN_URL: ${{ env.NEXT_PUBLIC_CDN_URL }}
          # Note: Database URL is needed during build for Prisma if it does queries, 
          # otherwise just schema generation.
          DATABASE_URL: ${{ secrets.DATABASE_URL }} 

      - name: Sync static files to S3
        run: |
          # Sync Next.js static assets
          aws s3 sync .next/static s3://${{ env.S3_BUCKET }}/_next/static --cache-control "public, max-age=31536000, immutable"
          # Sync public folder
          aws s3 sync public s3://${{ env.S3_BUCKET }} --cache-control "public, max-age=86400"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DIST_ID }} --paths "/*"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition hrm-task --query taskDefinition > task-def.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: hrm-container
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
